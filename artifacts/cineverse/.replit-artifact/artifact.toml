kind = "mobile"
previewPath = "/"
title = "CINEVERSE"
version = "1.0.0"
id = "artifacts/cineverse"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20113

[services.development]
run = "pnpm --filter @workspace/cineverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineverse", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cineverse", "run", "serve" ]

[services.env]
PORT = "20113"
BASE_PATH = "/"
